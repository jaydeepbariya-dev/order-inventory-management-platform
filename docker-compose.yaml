services:

  #---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- AUTH DATABASE ----------------
  auth-db:
    image: postgres:15
    container_name: auth-db

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - auth_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- AUTH SERVICE ----------------
  auth-service:
    container_name: auth-service
    build: ./auth-service
    image: auth-service

    depends_on:
      auth-db:
        condition: service_healthy

    ports:
      - "8081:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      JWT_SECRET: bXkgbmFtZSBpcyBqYXlkZWVwIGJhcml5YSBhbmQgaSB3aWxsIGJlIHN1Y2Nlc3NmdWwgaW4gdGhpcyB5ZWFy
      JWT_ACCESS_TOKEN_EXPIRATION: 900000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- PRODUCT DATABASE ----------------
  product-db:
    image: postgres:15
    container_name: product-db

    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - product_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- PRODUCT SERVICE ----------------
  product-service:
    container_name: product-service
    build: ./product-service
    image: product-service

    depends_on:
      product-db:
        condition: service_healthy

      redis:
        condition: service_healthy

    ports:
      - "8082:8082"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- INVENTORY DATABASE ----------------
  inventory-db:
    image: postgres:15
    container_name: inventory-db

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - inventory_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- INVENTORY SERVICE ----------------
  inventory-service:
    container_name: inventory-service
    build: ./inventory-service
    image: inventory-service

    depends_on:
      inventory-db:
        condition: service_healthy

      kafka-broker:
        condition: service_healthy

    ports:
      - "8084:8084"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: INFO

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- ORDER DATABASE ----------------
  order-db:
    image: postgres:15
    container_name: order-db

    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5436:5432"

    volumes:
      - order_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- ORDER SERVICE ----------------
  order-service:
    container_name: order-service
    build: ./order-service
    image: order-service

    depends_on:
      order-db:
        condition: service_healthy

      inventory-service:
        condition: service_healthy

      payment-service:
        condition: service_healthy

      redis:
        condition: service_healthy

      kafka-broker:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- PAYMENT DATABASE ----------------
  payment-db:
    image: postgres:15
    container_name: payment-db

    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5438:5432"

    volumes:
      - payment_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- PAYMENT SERVICE ----------------
  payment-service:
    container_name: payment-service
    build: ./payment-service
    image: payment-service

    depends_on:
      payment-db:
        condition: service_healthy

      kafka-broker:
        condition: service_healthy

    ports:
      - "8085:8085"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- NOTIFICATION DATABASE ----------------
  notification-db:
    image: postgres:15
    container_name: notification-db

    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5437:5432"

    volumes:
      - notification_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - internal

  # ---------------- NOTIFICATION SERVICE ----------------
  notification-service:
    container_name: notification-service
    build: ./notification-service
    image: notification-service

    depends_on:
      notification-db:
        condition: service_healthy

      kafka-broker:
        condition: service_healthy

    ports:
      - "8086:8086"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------- API GATEWAY ----------------
  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    image: api-gateway

    depends_on:
      redis:
        condition: service_healthy

      auth-service:
        condition: service_healthy

      product-service:
        condition: service_healthy

      order-service:
        condition: service_healthy

      inventory-service:
        condition: service_healthy

      payment-service:
        condition: service_healthy

      notification-service:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      SERVER_PORT: 8000

      SPRING_APPLICATION_NAME: api-gateway

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY: DEBUG

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - internal

  # ---------------------- KAFKA-BROKER ----------------------
  kafka-broker:
    image: apache/kafka:4.1.1
    container_name: kafka-broker

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

    networks:
      - internal

volumes:
  auth_data:
  product_data:
  inventory_data:
  order_data:
  payment_data:
  notification_data:
  redis_data:

networks:
  internal:
    driver: bridge